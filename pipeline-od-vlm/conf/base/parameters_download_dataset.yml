# Download Dataset Pipeline Parameters
#
# This file contains configuration for downloading the HuggingFace dataset.

# HuggingFace dataset identifier
hf_dataset_name: "CERTIFoundation/Maritime-SAR-Optical-Descriptions"

# Dataset split to load
hf_dataset_split: "train"

# Maximum number of samples to process (null = process all)
# Set to a small number for testing (e.g., 5)
hf_max_samples: 5
